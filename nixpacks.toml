[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs-18_x", "yarn"]

[phases.install]
cmds = [
  "cd backend && python -m pip install -r requirements.txt",
  "cd frontend && yarn install"
]

[phases.build]
cmds = [
  "cd frontend && yarn build"
]

[start]
cmd = "cd backend && python -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}"
